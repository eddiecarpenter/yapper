name: Agentic Pipeline

on:
  issues:
    types: [labeled, assigned]
  pull_request:
    types: [closed]
    branches:
      - main
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process review comments for'
        required: true
        type: string
      branch_name:
        description: 'Feature branch the PR is open on'
        required: true
        type: string

jobs:
  pipeline:
    uses: eddiecarpenter/gh-agentic/.github/workflows/agentic-pipeline.yml@v2.8.9
    with:
      pr_number: ${{ inputs.pr_number || '' }}
      branch_name: ${{ inputs.branch_name || '' }}
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

